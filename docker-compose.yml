services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: openclaw-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: Africa/Algiers
    volumes:
      # ربط مباشر لضمان قراءة ملف config.yml الذي أنشأناه يدوياً
      - ./oc_config:/home/node/.openclaw
    ports:
      - "18789:18789"
      - "18790:18790"
      - "18791:18791" # منفذ Browser Control الضروري
    init: true
    restart: unless-stopped
    # استخدام lan لفتح المنفذ و allow-unconfigured للسماح بالإعداد الأولي
    command: [ "node", "dist/index.js", "gateway", "--bind", "lan", "--allow-unconfigured" ]
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: "hafid2026"
      TZ: Africa/Algiers
    volumes:
      # توحيد مجلد الإعدادات مع الجيتواي لضمان التزامن
      - ./oc_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: [ "node", "dist/index.js" ]
    depends_on:
      - openclaw-gateway

volumes:
  # أبقينا فقط الوورك سبيس كـ Volume مستقل، وحذفنا الـ Config ليعتمد على الربط المباشر
  openclaw_workspace:
